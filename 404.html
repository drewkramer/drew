<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Drew Kramer</title>
  <meta name="robots" content="noindex" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22Georgia,serif%22>D</text></svg>" />

  <!-- Fonts: Bricolage Grotesque (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* center the sparse 404 copy vertically in its panel */
    .panel--content { justify-content: center; }
    .nf-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 1rem;
      max-width: 34rem;
    }
    .nf-code {
      font-family: "Bricolage Grotesque", -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: clamp(4rem, 12.5vw, 10rem);
      line-height: 0.85;
      letter-spacing: -0.04em;
      margin: 0 0 0.5rem;
      margin-left: -3px;
    }
    .nf-msg {
      font-size: 1.15rem;
      color: var(--muted);
      margin: 0;
    }
    .nf-home {
      margin-top: 0.75rem;
      font-weight: 600;
      font-size: 1.05rem;
    }
    .nf-gif {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
    /* stack on mobile: GIF sits below the copy, shorter */
    @media (max-width: 820px) {
      .panel--media .nf-gif { height: 42vh; }
    }
  </style>
</head>
<body>
  <div class="layout">

    <main class="panel panel--content">
      <div class="nf-content">
        <h1 class="nf-code">404</h1>
        <p class="nf-msg">This page got cooked. It may have moved, or it never existed.</p>
        <a class="nf-home" href="/">← Back to home</a>
      </div>
    </main>

    <div class="panel panel--media">
      <img class="nf-gif" src="images/swedish-chef.gif" alt="The Swedish Chef flailing in the kitchen" />
    </div>

  </div>
</body>
</html>
